<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admbase.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% if is_portfolio %}
    <div style="background: #e67e22; color: #fff; text-align: center; padding: 10px; font-size: 13px; font-weight: bold; letter-spacing: 0.5px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); position: relative; z-index: 9999;">
        ⚠️ PORTFOLIO SANDBOX MODE — System operations are simulated. Database writes are deactivated. — Database Last Update: 01.06.2026
    </div>
    {% endif %}

    <div class="app-container">
        <main class="main-content">
            <a href="{{ url_for('home') }}" class="brand-link">
                <span class="logo-icon">📂
                    <h2>myrtrack</h2>
                </span>
            </a>
            
            <div class="page-body">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
