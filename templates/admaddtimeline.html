{% extends "admbase.html" %}

{% block title %}Chronoform{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admchronoform.css') }}">
{% endblock %}

{% block content %}

<div class="layout">
    <div class="form-header">
        <h2>Chronoform</h2>
        <p>Add a video to the triage queue for later categorization.</p>
    </div>

    <form method="POST" class="admin-form">
        <div class="form-group">
            <label for="video_title">Video Title</label>
            <input type="text" id="video_title" name="video_title" placeholder="Enter title..." required>
        </div>

        <div class="form-group">
            <label for="release_date">Release Date</label>
            <div class="date-input-wrapper">
                <span class="calendar-icon">📅</span>
                <input type="date" id="release_date" name="release_date" required>
            </div>
        </div>

        <div class="form-group">
            <label for="video_notes">Notes</label>
            <textarea id="video_notes" name="video_notes" rows="4" placeholder="Optional notes..."></textarea>
        </div>

        <div class="form-group checkbox-row">
            <input type="checkbox" name="is_variety" id="is_variety">
            <label for="is_variety" class="variety-accent">Is Variety Content?</label>
        </div>

        <button type="submit" class="submit-btn">Add to Triage Queue</button>
    </form>

    <div class="form-footer">
        <a href="{{ url_for('sorttimeline') }}" class="back-link">← Back to Chronological Triage</a>
    </div>
</div>
{% endblock %}
